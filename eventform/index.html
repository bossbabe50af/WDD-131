<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <h1>Event Ticket</h1>

        <form id="ticketForm" aria-describedby="formInstructions errors ticketInfo">
            <p id="formInstructions" class="visually-hidden">
                Complete the form to create an event ticket. Choose student or guest.
                Students must enter a 9 digit
                student I number. Guests must enter the access code EVENT131.
            </p>

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" type="text" autocomplete="given-name" required />
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" autocomplete="family-name" required />
            </div>

            <div class="form-group email">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required />
            </div>

            <div class="form-group">
                <label for="type">Type</label>
                <select id="type" name="type" aria-describedby="typeHelp" required>
                    <option value="">Choose one</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
                <span id="typeHelp" class="visually-hidden">
                    Choose student if you have a student I number. Choose guest if you
                    have an access code.
                </span>
            </div>

            <div class="form-group">
                <label for="eventDate">Event Date</label>
                <input type="date" id="eventDate" name="eventDate" required>
            </div>

            <div id="extraInfo" class="form-group hidden-field hide">
                <label for="extraInput" id="extraLabel"></label>
                <input type="text" id="extraInput" name="extraInput" aria-describedby="extraHelp">
                <span id="extraHelp" class="visually-hidden"></span>
            </div>

            <button type="submit">Create Ticket</button>
        </form>

        <div id="errors" role="alert" aria-live="assertive"></div>
        <div id="ticketInfo" aria-live="polite"></div>
    </main>
</body>

</html>
