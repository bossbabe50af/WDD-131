<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A simple recipe book with easy recipes.">
    <meta property="og:url" content="https://bossbabe50af.github.io/WDD-131/recipes/">
    <meta property="og:image" content="images/social-preview-image.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A simple recipe book with easy recipes.">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <script defer src="recipes.js"></script>


    <title>Recipe Book</title>
</head>

<body>
    <header>
        <img src="images/recipe-book.png" alt="Recipe Book logo">
        <h1>Recipe Book</h1>
    </header>

    <main>
        <div class="search">
            <label for="search" class="visually-hidden">Find a recipe</label>

            <input type="text" id="search" placeholder="Find a recipe">

            <button type="button" aria-label="Search recipes">
                <img src="images/search.svg" alt="">
            </button>
        </div>

        <section id="recipe-container">

        </section>
    </main>

    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from 
             https://www.iconfinder.com/AlfredoCreates -->
            <a href="#">
                <img src="images/instagram_icon.svg" alt="Instagram">
            </a>

            <a href="#">
                <img src="images/youtube_icon.svg" alt="YouTube">
            </a>

            <a href="#">
                <img src="images/pinterest_icon.svg" alt="Pinterest">
            </a>
        </div>

        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>
    </footer>
</body>

</html>
